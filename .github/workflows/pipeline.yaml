name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

# ---------------- TEST ----------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, pdo, pdo_mysql, bcmath

      - name: Check Project Files
        run: |
          ls -la
          test -f composer.json

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-security-blocking

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Tests
        run: php artisan test


# ---------------- BUILD FRONTEND ----------------
  build:
    name: Build Frontend Assets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: public


# ---------------- DEPLOY TO EC2 ----------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Rsync
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PATH: ${{ secrets.EC2_PATH }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        run: |
          TARGET="${EC2_PATH:-/var/www/laravel-Deployment}"

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='storage' \
            ./ $EC2_USER@$EC2_HOST:$TARGET -e "ssh -p ${EC2_PORT:-22}"

      - name: Run Laravel Commands on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_PATH: ${{ secrets.EC2_PATH }}
        run: |
          ssh -p ${EC2_PORT:-22} $EC2_USER@$EC2_HOST "
            cd ${EC2_PATH:-/var/www/laravel-Deployment} &&
            composer install --no-dev --optimize-autoloader --no-security-blocking &&
            php artisan migrate --force &&
            php artisan optimize:clear &&
            php artisan config:cache &&
            php artisan route:cache &&
            php artisan view:cache &&
            sudo systemctl restart php8.2-fpm || true
          "