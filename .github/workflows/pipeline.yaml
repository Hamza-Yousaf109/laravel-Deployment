# CI/CD pipeline for Laravel application
# Secrets required: SSH_PRIVATE_KEY, REMOTE_HOST, REMOTE_USER, REMOTE_PATH

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring,openssl,pdo_mysql,tokenizer,xml

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare environment
        run: cp .env.example .env || true

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Run migrations (sqlite in-memory)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan migrate --force --no-interaction

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: ./vendor/bin/phpunit --no-coverage

  build:
    name: Build assets
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --if-present

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install Composer (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          name: public

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy files with rsync
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            ./ $REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH -e "ssh -p ${REMOTE_PORT:-22}"
          ssh -p ${REMOTE_PORT:-22} $REMOTE_USER@$REMOTE_HOST "cd $REMOTE_PATH && php artisan migrate --force || true && php artisan config:cache || true"
