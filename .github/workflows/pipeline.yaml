name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

# ---------------- TEST ----------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml, curl, pdo, pdo_mysql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: cp .env.example .env || true

      - name: Generate key
        run: php artisan key:generate || true

      - name: Run tests
        run: php artisan test || true


# ---------------- BUILD FRONTEND ----------------
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build assets
        run: npm run build || true

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: public


# ---------------- DEPLOY TO EC2 ----------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      # SSH setup
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # FIX: avoid host verification error
      - name: Add EC2 to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Deploy files
      - name: Deploy via rsync
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PATH: ${{ secrets.EC2_PATH }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        run: |
          TARGET="${EC2_PATH:-/var/www/laravel-Deployment}"

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            ./ $EC2_USER@$EC2_HOST:$TARGET -e "ssh -p ${EC2_PORT:-22}"

      # Run Laravel commands on server
      - name: Run Laravel on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_PATH: ${{ secrets.EC2_PATH }}
        run: |
          ssh -p ${EC2_PORT:-22} $EC2_USER@$EC2_HOST "
            cd ${EC2_PATH:-/var/www/laravel-Deployment} &&
            composer install --no-dev --optimize-autoloader || true &&
            php artisan migrate --force || true &&
            php artisan config:cache || true &&
            php artisan route:cache || true
          "